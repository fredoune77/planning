<main class="container">
      <header>
        <h1>Planning hebdomadaire</h1>
        <p>Objectif: 37h sur la semaine</p>
      </header>

      <section class="weekly-card">
        <p class="hours">Temps total: <strong>{{ formatDuration(weeklyWorkedMinutes) }}</strong></p>
        <p [class.over]="weeklyDeltaMinutes > 0" [class.under]="weeklyDeltaMinutes < 0">
          Ecart: {{ weeklyDeltaLabel }}
        </p>
      </section>

      <section class="day-list">
        <article class="day-card" *ngFor="let day of days" [class.holiday-day]="schedule[day.key].holiday">
          <div class="day-header">
            <h2>{{ day.label }}</h2>
            <span *ngIf="schedule[day.key].holiday" class="holiday-badge">Ferie</span>
          </div>

          <div class="time-row">
            <label [for]="day.key + '-arrival'">Arrivee</label>
            <input
              [id]="day.key + '-arrival'"
              type="time"
              step="300"
                  [min]="formatBound(day.arrivalMin)"
                  [max]="formatBound(day.arrivalMax)"
              [disabled]="schedule[day.key].holiday"
              [(ngModel)]="schedule[day.key].arrival"
              (ngModelChange)="onTimeChange(day, 'arrival')"
            />
          </div>

          <div class="meal">Repas: {{ lunchStart }} - {{ lunchEnd }}</div>

              <label class="holiday-toggle" [for]="day.key + '-holiday'">
                <input
                  [id]="day.key + '-holiday'"
                  type="checkbox"
                  [(ngModel)]="schedule[day.key].holiday"
                  (ngModelChange)="onHolidayToggle(day)"
                />
                <span>Jour ferie (7h24)</span>
              </label>

              <label class="sport-toggle" [for]="day.key + '-sport'">
                <input
                  [id]="day.key + '-sport'"
                  type="checkbox"
                  [disabled]="schedule[day.key].holiday"
                  [(ngModel)]="schedule[day.key].sport"
                  (ngModelChange)="onSportToggle(day)"
                />
                <span>Sport (depart a 17:00)</span>
              </label>

          <div class="time-row">
            <label [for]="day.key + '-departure'">Depart</label>
            <input
              [id]="day.key + '-departure'"
              type="time"
              step="300"
                  [min]="schedule[day.key].sport ? '17:00' : formatBound(day.departureMin)"
                  [max]="schedule[day.key].sport ? '17:00' : formatBound(day.departureMax)"
                   [disabled]="schedule[day.key].sport || schedule[day.key].holiday"
              [(ngModel)]="schedule[day.key].departure"
              (ngModelChange)="onTimeChange(day, 'departure')"
            />
          </div>

          <p class="day-total">
            Total jour: {{ formatDuration(getDayWorkedMinutes(day)) }}
            <span *ngIf="schedule[day.key].holiday" class="day-note">(jour ferie)</span>
          </p>
        </article>
      </section>

      <section class="export-card">
        <button type="button" (click)="generatePlanningText()">Generer le planning texte</button>
        <textarea
          rows="7"
          readonly
          [value]="planningText"
          placeholder="Le texte du planning apparaitra ici..."
        ></textarea>
        <button type="button" class="secondary" (click)="copyPlanningText()">Copier</button>
        <p class="copy-message" *ngIf="copyMessage">{{ copyMessage }}</p>
      </section>
</main>
